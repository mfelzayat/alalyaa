<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" role="img" aria-label="Strike Media — PR &amp; Advertising Agency">
  <title>Strike Media — PR &amp; Advertising Agency</title>
  <defs>
    <radialGradient id="sm-sphere" cx="36%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#9A9A9A"/>
      <stop offset="38%"  stop-color="#4A4A4A"/>
      <stop offset="78%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="sm-hilite" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="sm-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </linearGradient>
  </defs>

  <!-- Dark 3D sphere -->
  <g transform="translate(0 6)">
    <circle cx="60" cy="60" r="56" fill="url(#sm-sphere)"/>
    <circle cx="60" cy="60" r="56" fill="none" stroke="url(#sm-rim)" stroke-width="1.5" opacity="0.9"/>
    <!-- Top-left highlight gloss -->
    <ellipse cx="42" cy="36" rx="26" ry="14" fill="url(#sm-hilite)"/>

    <!-- Red 'S' swoosh — two interlocking crescent ribbons -->
    <!-- Top crescent: opens to the bottom-right -->
    <path d="M 32 50
             C 32 30, 58 22, 80 30
             C 84 31.5, 86 33, 87 35
             L 78 44
             C 76 42.5, 73 42, 69 42
             C 56 42, 46 48, 46 56
             C 46 58.5, 47 60.5, 49 62
             L 38 67
             C 34 63, 32 57, 32 50 Z"
          fill="#D62A23"/>

    <!-- Bottom crescent: opens to the top-left -->
    <path d="M 88 70
             C 88 90, 62 98, 40 90
             C 36 88.5, 34 87, 33 85
             L 42 76
             C 44 77.5, 47 78, 51 78
             C 64 78, 74 72, 74 64
             C 74 61.5, 73 59.5, 71 58
             L 82 53
             C 86 57, 88 63, 88 70 Z"
          fill="#D62A23"/>
  </g>

  <!-- "Strike media" wordmark -->
  <g font-family="'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive"
     font-style="italic" font-weight="700">
    <text x="128" y="68" font-size="56" fill="#D62A23">Strike</text>
    <text x="278" y="100" font-size="44" fill="#1A1A1A">media</text>
  </g>

  <!-- Tagline -->
  <text x="128" y="128"
        font-family="'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive"
        font-weight="700" font-size="20" fill="#1A1A1A">PR &amp; Advertising Agency</text>
</svg>
