<script type="text/babel">
const App = () => (
  <deck-stage width="1920" height="1080">
    <GCover/>
    <GContents/>
    <GIntro/>
    <GMission/>
    <GValues/>
    <GWordmark/>
    <GConceptAR/>
    <GClearZone/>
    <GWordmarkEN/>
    <GClearZoneEN/>
    <GDualLockup/>
    <GLogoSystem/>
    <GColour/>
    <GType/>
    <GStationery/>
    <GSignage/>
    <GColophon/>
  </deck-stage>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
/* THE ASCENT — Cinematic Curtain orchestrator.
   A theatrical curtain of midnight wings meet at center, a brass
   slit of light grows vertically, a massive numeral + chapter name
   ghost through the seam, a shimmer sweeps once, the wings part to
   reveal the next slide rising up with parallax + focus pull-in. */
(() => {
  const CHAPTERS = [
    { num: "٠",  en: "Cover",            ar: "الغــلاف" },
    { num: "٠",  en: "Contents",         ar: "الفهــرس" },
    { num: "١",  en: "Introduction",     ar: "تقديــم" },
    { num: "١",  en: "Mission · Vision", ar: "رؤيــة · رســالة" },
    { num: "١",  en: "Brand Values",     ar: "القيــم" },
    { num: "٢",  en: "The Wordmark",     ar: "الشعــار" },
    { num: "٢",  en: "The Concept",      ar: "المفهــوم" },
    { num: "٢",  en: "Clear Zone",       ar: "المســاحة" },
    { num: "٢",  en: "English Wordmark", ar: "اللاتينــي" },
    { num: "٢",  en: "Latin Clear Zone", ar: "المســاحة" },
    { num: "٢",  en: "Dual Lockup",      ar: "التلازم" },
    { num: "٢",  en: "Logo System",      ar: "النظــام" },
    { num: "٣",  en: "Colour Palette",   ar: "الألــوان" },
    { num: "٣",  en: "Typography",       ar: "الطباعــة" },
    { num: "٤",  en: "Stationery",       ar: "القرطاســية" },
    { num: "٤",  en: "Signage",          ar: "اللوحــات" },
    { num: "٥",  en: "Colophon",         ar: "الختــام" },
  ];

  const curtain = document.createElement('div');
  curtain.className = 'ascent-curtain';
  curtain.innerHTML = `
    <div class="wing l"></div>
    <div class="wing r"></div>
    <div class="halo"></div>
    <div class="slit"></div>
    <div class="numeral"></div>
    <div class="chapter">
      <div class="en"></div>
      <div class="ar"></div>
    </div>
    <div class="shimmer"></div>
  `;
  document.body.appendChild(curtain);
  const numEl = curtain.querySelector('.numeral');
  const enEl  = curtain.querySelector('.chapter .en');
  const arEl  = curtain.querySelector('.chapter .ar');

  let playing = false;
  function playCurtain(toIndex, fromSlide, toSlide) {
    if (playing) return;
    playing = true;
    const meta = CHAPTERS[toIndex] || { num: String(toIndex + 1), en: "", ar: "" };
    numEl.textContent = meta.num;
    enEl.textContent  = meta.en;
    arEl.textContent  = meta.ar;

    // Outgoing slide lifts + blurs
    if (fromSlide) {
      fromSlide.classList.remove('deck-leaving');
      void fromSlide.offsetWidth;
      fromSlide.classList.add('deck-leaving');
      setTimeout(() => fromSlide.classList.remove('deck-leaving'), 560);
    }

    // Curtain sequence
    curtain.removeAttribute('data-playing');
    void curtain.offsetWidth;
    curtain.setAttribute('data-playing', '');

    // Incoming slide — focus-pull + parallax rise, synced with wing opening (t=980)
    if (toSlide) {
      setTimeout(() => {
        toSlide.classList.remove('deck-arriving');
        void toSlide.offsetWidth;
        toSlide.classList.add('deck-arriving');
        setTimeout(() => toSlide.classList.remove('deck-arriving'), 900);
      }, 960);
    }

    setTimeout(() => {
      curtain.removeAttribute('data-playing');
      playing = false;
    }, 1450);
  }

  function attach() {
    const stage = document.querySelector('deck-stage');
    if (!stage) return setTimeout(attach, 60);
    stage.addEventListener('slidechange', (e) => {
      const { index, previousIndex, reason, slide, previousSlide } = e.detail;
      if (reason === 'init' || previousIndex === -1) return;
      playCurtain(index, previousSlide, slide);
    });
  }
  setTimeout(attach, 0);
})();
</script>
<script>
/* THE ASCENT — motion orchestrator.
   On every slide change, re-trigger in-slide entrance animations by
   toggling .is-entering, and auto-wire default anim-* classes on
   common guideline primitives so every slide gets choreography for free. */
(() => {
  const AUTO_RULES = [
    // [selector,                    class,      extraDelay]
    ['.folio',                       'anim-up'],
    ['.section-tag',                 'anim-up'],
    ['.section-number',              'anim-up'],
    ['.title-display',               'anim-clip'],
    ['.title-sans',                  'anim-up'],
    ['.ar-title',                    'anim-rtl'],
    ['.ar-body',                     'anim-rtl'],
    ['.body-copy',                   'anim-up'],
    ['.rule',                        'anim-rule'],
    ['.rule--thick',                 'anim-rule'],
    ['.rule--foil',                  'anim-rule'],
    ['.crosshair',                   'anim-crosshair'],
    ['.bottom-rail',                 'anim-up'],
    ['.foil-chip',                   'anim-up'],
  ];
  function autowire(slide) {
    AUTO_RULES.forEach(([sel, cls]) => {
      slide.querySelectorAll(sel).forEach(el => el.classList.add(cls));
    });
    // Give body-copy paragraphs graduated delay based on order within parent
    slide.querySelectorAll('.body-copy').forEach((el, i) => {
      el.style.animationDelay = (320 + i * 90) + 'ms';
    });
    // Titles get a tiny pre-delay
    slide.querySelectorAll('.title-display').forEach((el) => {
      el.style.animationDelay = '140ms';
    });
    slide.querySelectorAll('.ar-title').forEach((el, i) => {
      el.style.animationDelay = (240 + i * 60) + 'ms';
    });
  }

  function replay(slide, delay) {
    if (!slide) return;
    autowire(slide);
    slide.classList.remove('is-entering');
    void slide.offsetWidth;
    setTimeout(() => {
      slide.classList.add('is-entering');
      clearTimeout(slide.__ascentT);
      slide.__ascentT = setTimeout(() => slide.classList.remove('is-entering'), 2800);
    }, delay);
  }

  function attach() {
    const stage = document.querySelector('deck-stage');
    if (!stage) { return setTimeout(attach, 60); }
    // Initial
    const initial = stage.querySelector('[data-deck-active]');
    if (initial) replay(initial, 0);
    stage.addEventListener('slidechange', (e) => {
      const { reason } = e.detail;
      const delay = (reason === 'init') ? 0 : 1060;
      replay(e.detail.slide, delay);
    });
  }
  // Defer a tick so React has mounted children.
  setTimeout(attach, 0);
})();
</script>
</body>
